{% extends "base.html" %}
{% block content %}
<div class="auth-form">
    <h1>Login</h1>
    <form method="post" action="{% url 'login' %}" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p style="margin-top:1rem;text-align:center">Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
</div>
{% endblock %}
